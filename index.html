<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generatore di QR Code Semplice</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }
        #qr-image-container {
            margin: 24px auto 0;
            min-height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #qr-image-container canvas,
        #qr-image-container img {
            display: block;
            margin: 0 auto;
        }
        input[type="text"] {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            margin-right: 10px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    
        .input-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 650px;
            margin: 0 auto;
        }

        @media (max-width: 700px) {
            body {
                padding: 24px;
            }

            .input-row {
                flex-direction: column;
                align-items: stretch;
            }

            input[type="text"] {
                width: 100%;
                max-width: none;
                box-sizing: border-box;
                margin-right: 0;
            }

            button {
                width: 100%;
            }
        }

      </style>
</head>
<body>

    <h1>Generatore di QR Code</h1>
    <p>Inserisci il testo o l'URL e premi "Genera QR Code".</p>

    <div class="input-row">
        <input type="text" id="qr-data" placeholder="Inserisci qui il testo o l'URL">
        <button onclick="generateQR()">Genera QR Code</button>
    </div>

    <div id="qr-image-container">
        </div>

    <script src="vendor/qrcode.min.js"></script>

    <script>
        function generateQR() {
            const data = document.getElementById('qr-data').value.trim();
            const container = document.getElementById('qr-image-container');

            container.innerHTML = "";

            if (!data) {
                container.textContent = "Per favore, inserisci un testo o un URL.";
                return;
            }

            if (typeof QRCode === "undefined") {
                container.textContent = "Errore: libreria QR locale non caricata.";
                console.error("QRCode library not loaded");
                return;
            }

            new QRCode(container, {
                text: data,
                width: 180,
                height: 180,
                correctLevel: QRCode.CorrectLevel.M
            });
        }
    </script>

Di <a href="https://www.gabrieleviola.it">Gabriele Viola</a> <span class="current-year"></span> Copyright - QR generato localmente nel browser. I dati non vengono salvati o trasmessi.

<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll(".current-year").forEach(function(el) {
            el.textContent = new Date().getFullYear();
        });
    });
</script>

</body>
</html>
